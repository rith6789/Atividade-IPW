<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="ver()">Clique aqui para contar números de 1 a 10</button>
    <p id="a"> </p>
    <script>
        function ver() {
            let numero = 1;
            while (numero <= 10) {
                alert(numero);
                numero++;
                document.getElementById('a').innerText = numero;
            }
        }
    </script>
</body>
</html>
